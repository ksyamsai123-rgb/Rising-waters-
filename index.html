<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction System</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            background:#eaf6ff;
            margin:0;
            padding:0;
        }
        .container{
            width:420px;
            margin:30px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }
        h1{
            text-align:center;
            color:#0077b6;
        }
        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }
        button{
            width:100%;
            padding:12px;
            background:#0077b6;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
        button:hover{
            background:#023e8a;
        }
        h2{
            text-align:center;
            color:green;
        }
    </style>
</head>
<body>

<div class="container">

<h1>🌊 Flood Prediction System</h1>

<form action="/predict" method="post">

<input type="number" step="any" name="Temp" placeholder="Temperature" required>
<input type="number" step="any" name="Humidity" placeholder="Humidity" required>
<input type="number" step="any" name="Cloud Cover" placeholder="Cloud Cover" required>
<input type="number" step="any" name="ANNUAL" placeholder="Annual Rainfall" required>
<input type="number" step="any" name="Jan-Feb" placeholder="Jan-Feb" required>
<input type="number" step="any" name="Mar-May" placeholder="Mar-May" required>
<input type="number" step="any" name="Jun-Sep" placeholder="Jun-Sep" required>
<input type="number" step="any" name="Oct-Dec" placeholder="Oct-Dec" required>
<input type="number" step="any" name="avgjune" placeholder="Average June Rainfall" required>
<input type="number" step="any" name="sub" placeholder="Sub Rainfall" required>

<button type="submit">Predict Flood</button>

</form>

{% if prediction %}
<h2>Prediction: {{ prediction }}</h2>
{% endif %}

</div>

</body>
</html>
